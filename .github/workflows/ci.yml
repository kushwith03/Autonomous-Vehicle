name: CI Pipeline

on:
  push:
    branches: [main, develop, "feature/*", "repo-cleanup"]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python 3.8
        uses: actions/setup-python@v4
        with:
          python-version: "3.8"
      - name: Install dependencies (no CARLA)
        run: |
          pip install torch==1.13.1+cpu torchvision==0.14.1+cpu -f https://download.pytorch.org/whl/torch_stable.html
          pip install numpy pandas pyyaml pillow scikit-learn tqdm tensorboard pytest
      - name: Run unit tests
        run: python -m pytest tests/ -v --tb=short
      - name: Check import integrity
        run: |
          python -c "from models.autoencoder import AutoEncoder; print('AE OK')"
          python -c "from models.controller import ControlNet; print('ControlNet OK')"
          python -c "from models.cnn_controller import CNNController; print('CNNController OK')"
          python -c "from utils.benchmark import benchmark_inference; print('Benchmark OK')"
          python -c "from utils.metrics import compute_navigation_error; print('Metrics OK')"
