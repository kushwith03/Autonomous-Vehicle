paths:
  carla_root: "datasets/carla"
  carla_labels_csv: "datasets/carla_labels.csv"
  cityscapes_root: "datasets/cityscapes"
  cityscapes_labels_csv: "datasets/cityscapes_labels.csv"
  checkpoints: "results/checkpoints"
  logs: "results/logs"

dataset:
  total_images: 8000
  carla_images: 5000
  cityscapes_images: 3000
  use_combined: true

models:
  autoencoder:
    input_dim: [3, 128, 128]
    latent_dim: 8192
  cnn_controller:
    output_dim: 3
    dropout: 0.3

training:
  stage1:
    epochs: 20
    batch_size: 64
    lr: 0.001
  cnn_bc:
    epochs: 30
    batch_size: 32
    lr: 0.0003
    save_every: 5
